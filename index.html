<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #0b0b0b;
    color: #f5f5f5;
  }

  h1 {
    text-align: center;
    color: #f7a8c4; /* pastel pink */
  }

  form, .applications, #loginSection {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 0 8px rgba(247, 168, 196, 0.2);
  }

  label {
    font-weight: bold;
    color: #f9c5d5;
  }

  input, select {
    margin: 5px 0 10px 0;
    padding: 10px;
    width: 100%;
    border: 1px solid #f7a8c4;
    border-radius: 6px;
    background-color: #111;
    color: #fff;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #f9c5d5;
    box-shadow: 0 0 5px rgba(247, 168, 196, 0.5);
  }

  button {
    background-color: #f7a8c4;
    color: black;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
  }

  button:hover {
    background-color: #f9c5d5;
  }

  .job {
    border-bottom: 1px solid #333;
    padding: 10px 0;
  }

  #welcome {
    color: #f9c5d5;
  }

  #statusMessage {
    margin-bottom: 10px;
    color: #f7a8c4;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>Job Application Tracker</h1>

<!-- Login -->
<div id="loginSection">
  <label for="username">Username</label>
  <input type="text" id="username">
  <button onclick="login()">Login</button>
</div>

<h2 id="welcome"></h2>

<!-- Status messages for screen readers -->
<div id="statusMessage" aria-live="polite"></div>

<!-- Form -->
<form id="jobForm">
  <label for="company">Company Name</label>
  <input type="text" id="company">

  <label for="role">Job Role</label>
  <input type="text" id="role">
  
  <label for="status">Application Status</label>
  <select id="status">
    <option value="Applied">Applied</option>
    <option value="Interview">Interview</option>
    <option value="Rejected">Rejected</option>
  </select>

  <button type="submit">Add Application</button>
</form>

<!-- Applications -->
<div class="applications">
  <label for="filterStatus">Filter</label>
  <select id="filterStatus">
    <option value="All">All</option>
    <option value="Applied">Applied</option>
    <option value="Interview">Interview</option>
    <option value="Rejected">Rejected</option>
  </select>

  <div id="jobList"></div>
</div>

<script>
  const form = document.getElementById("jobForm");
  const jobList = document.getElementById("jobList");
  const filter = document.getElementById("filterStatus");

  let jobs = [];
  let currentUser = null;

  function login() {
    const username = document.getElementById("username").value;

    if (!username) return;

    currentUser = username;

    document.getElementById("welcome").textContent =
      `Welcome, ${username}`;

    loadJobs();
  }

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    if (!currentUser) {
      alert("Please login first");
      return;
    }

    const company = document.getElementById("company").value;
    const role = document.getElementById("role").value;
    const status = document.getElementById("status").value;

    const job = {
      id: Date.now(),
      company,
      role,
      status,
      editing: false
    };

    jobs.push(job);
    form.reset();
    saveJobs();
    displayJobs();
  });

  filter.addEventListener("change", displayJobs);

  function displayJobs() {
    jobList.innerHTML = "";

    const selected = filter.value;

    const filteredJobs = selected === "All"
      ? jobs
      : jobs.filter(job => job.status === selected);

    filteredJobs.forEach(job => {
      const div = document.createElement("article");
      div.className = "job";

      if (job.editing) {
        div.innerHTML = `
          <strong>${job.company}</strong> - ${job.role}
          <select onchange="updateStatus(${job.id}, this.value)">
            <option value="Applied" ${job.status === "Applied" ? "selected" : ""}>Applied</option>
            <option value="Interview" ${job.status === "Interview" ? "selected" : ""}>Interview</option>
            <option value="Rejected" ${job.status === "Rejected" ? "selected" : ""}>Rejected</option>
          </select>
          <button onclick="toggleEdit(${job.id})">Save</button>
        `;
      } else {
        div.innerHTML = `
          <strong>${job.company}</strong> - ${job.role} (${job.status})
          <button onclick="toggleEdit(${job.id})">Edit ${job.company}</button>
          <button onclick="deleteJob(${job.id})">Delete ${job.company}</button>
        `;
      }

      jobList.appendChild(div);
    });
  }

  function toggleEdit(id) {
    jobs = jobs.map(job => {
      if (job.id === id) {
        job.editing = !job.editing;
      }
      return job;
    });

    displayJobs();

    setTimeout(() => {
      const select = document.querySelector("select");
      if (select) select.focus();
    }, 0);
  }

  function updateStatus(id, newStatus) {
    jobs = jobs.map(job => {
      if (job.id === id) {
        job.status = newStatus;

        document.getElementById("statusMessage").textContent =
          `${job.company} updated to ${newStatus}`;
      }
      return job;
    });

    saveJobs();
  }

  function deleteJob(id) {
    jobs = jobs.filter(job => job.id !== id);

    document.getElementById("statusMessage").textContent =
      `Application deleted`;

    saveJobs();
    displayJobs();
  }

  function saveJobs() {
    if (!currentUser) return;
    localStorage.setItem(currentUser, JSON.stringify(jobs));
  }

  function loadJobs() {
    const data = localStorage.getItem(currentUser);
    jobs = data ? JSON.parse(data) : [];
    displayJobs();
  }
</script>

</body>
</html>
